<svg viewBox="0 0 300 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .shield-outline { stroke: #00D4FF; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .shield-fill { stroke: #00D4FF; fill: none; }
      .wave { stroke: #00D4FF; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>
  
  <!-- Shield outline - main border -->
  <path class="shield-outline" stroke-width="22" d="M150 25 L260 90 L260 200 C260 290 150 350 150 350 C150 350 40 290 40 200 L40 90 Z"/>
  
  <!-- Shield inner detail line -->
  <path class="shield-fill" stroke-width="4" opacity="0.6" d="M150 45 L245 105 L245 195 C245 275 150 330 150 330 C150 330 55 275 55 195 L55 105 Z"/>
  
  <!-- Wave lines - flowing from right to left with curves -->
  <g class="wave" stroke-width="18" opacity="0.95">
    <!-- Top wave -->
    <path d="M110 140 Q150 125 240 175"/>
    
    <!-- Upper middle wave -->
    <path d="M100 190 Q150 165 250 230"/>
    
    <!-- Lower middle wave -->
    <path d="M90 240 Q150 205 260 285"/>
    
    <!-- Bottom wave -->
    <path d="M80 290 Q150 245 270 340"/>
  </g>
  
  <!-- Shadow/depth on left side of shield -->
  <path class="shield-fill" stroke-width="2" opacity="0.3" d="M50 100 L50 190 C50 270 120 320 150 350"/>
</svg>
